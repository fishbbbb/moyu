sites:
  - id: qidian
    name: 起点中文网
    domain: book.qidian.com
    detailUrlSample: "https://book.qidian.com/info/1040783054/"
    chapterUrlSample: "https://read.qidian.com/chapter/ex-xXw912HwCpOPIBxLXdQ2/H487g_cECzVMs5iq0oQwLQ2/"
    sampleInfo:
      workTitle: "《全职法师之青衣剑仙》"
      detailPageLabel: "作品信息页 / 目录入口页"
      chapterLabel: "第261章：一剑蜕凡尘"
      sampleStatus: "已替换为真实章节链接；外部自动探测可能受站点风控影响"
      notes:
        - "章节页来自起点公开索引结果，可用于人工可达性与解析回归。"
    verifiedLevel: "full"
    requiresLoginOrPaywall: true
    siteStructure:
      titleSelectors:
        - "h1.book-name"
        - 'meta[property=\"og:title\"]'
        - "title"
      introSelectors:
        - ".book-intro"
        - 'meta[property=\"og:description\"]'
        - 'meta[name=\"description\"]'
      tocHints:
        containers:
          - "#volume-all"
          - ".volume-list"
          - ".catalog-content"
          - "main"
        linkSelector: "a[href]"
        chapterTextHeuristics:
          - "文本中含有“第…章”且长度 < 40"
          - "短标题（<= 20 字）视为章节候选"
      chapterNavType:
        - "锚文本“下一章/上一章”"
        - "URL 路径中含章节 ID，数值递增"
      paginationNotes:
        - "部分章节可能存在分页提示“1/2、下一页”等，当前版本会触发 PAGINATION_DETECTED；优先选单页阅读链接作为样例。"
      dynamicRendering: false
      notes:
        - "作品信息页 book.qidian.com/info/* 通常左侧为封面，右侧为书名/作者/简介，下方为“目录”模块，目录内是 ul/li + a[href] 结构，易被 detectTOC 命中。"
    selfTestNotes:
      recommendedMode: "book"
      expectedFailureCodes:
        - "ANTI_BOT_OR_BLOCKED"
        - "EXTRACTION_TIMEOUT"
      manualSteps:
        - "在采集窗口输入 detailUrlSample，点击“打开网页”后使用“解析目录”；确认章节数与站点目录接近。"
        - "使用 chapterUrlSample 测试“提取当前页”和阅读时按需拉取正文。"

