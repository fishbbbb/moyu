      notes:
        - "该样例同时出现在现有 PRD/调研文档中，适合作为晋江回归测试基准。"
    verifiedLevel: "full"
    requiresLoginOrPaywall: true
    siteStructure:
      titleSelectors:
        - "h1"
        - 'meta[property=\"og:title\"]'
        - "title"
      introSelectors:
        - "#novelintro"
        - ".novelintro"
        - 'meta[property=\"og:description\"]'
        - 'meta[name=\"description\"]'
      tocHints:
        containers:
          - "#oneboolt"
          - ".novelbody"
          - "body"
        linkSelector: "a[href*=\"onebook.php\"]"
        chapterTextHeuristics:
          - "链接文本较短（<= 20 字）且包含章节序号"
          - "onebook.php?chapterid=*&novelid=* 归并为同一作品目录"
      chapterNavType:
        - "章节页顶部/底部存在“上一页/下一页/返回目录”等链接"
        - "chapterid 查询参数单调递增/递减"
      paginationNotes:
        - "章节页可能出现“1/2、下一页”等分页提示，但 WebContentExtractor 已对 jjwxc onebook.php 特判忽略分页误判。"
      dynamicRendering: false
      notes:
        - "desktop/electron/main.ts 已内置 jjwxc onebook.php adapter，会从所有 onebook.php?novelid=...&chapterid=... 链接中聚合章节并去重。"
        - "付费章节需要登录+购买，否则正文提取可能返回 AUTH_REQUIRED 或 PAYWALL_BLOCKED。"
    selfTestNotes:
      recommendedMode: "book"
      expectedFailureCodes:
        - "AUTH_REQUIRED"
        - "PAYWALL_BLOCKED"
      manualSteps:
        - "使用 detailUrlSample 测试“解析目录”，确认目录条数与站点实际章节数接近。"
        - "在浏览器中登录并购买至少一章后，再用相应 chapterUrlSample 测试“提取当前页”。"

